<!DOCTYPE html>
<html>
    <body>
        <h1>even or odd number</h1>
        <script>
            let evenodd=function (number){
                if (number%2==0){
                    document.write(number+"is a even number")
                }
                else{
                    document.write(number+"is a odd number")
                }
            }
            let number=prompt("enter a number");
            evenodd(number);
        </script>
    </body>
</html>
